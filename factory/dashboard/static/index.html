<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --cyan: #39d2e0;
    --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  .logo {
    color: var(--cyan);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 2px;
  }

  .header-info .subtitle {
    color: var(--text-dim);
    font-size: 12px;
  }

  .header-info .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.idle { background: var(--text-dim); }

  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 80px 1fr 1fr;
    gap: 0;
    height: calc(100vh - 80px);
  }

  .panel {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }

  /* Projects panel — spans both content rows (below KPI strip) */
  .projects-panel {
    grid-row: 2 / 4;
  }

  /* Events panel — top right */
  .events-panel {
    grid-column: 2;
    grid-row: 2;
  }

  /* Experiments panel — bottom right */
  .experiments-panel {
    grid-column: 2;
    grid-row: 3;
    border-bottom: none;
  }

  /* Project cards */
  .project-card {
    padding: 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .project-card:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .project-card.selected {
    background: var(--surface);
    border-color: var(--accent);
  }

  .project-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .project-goal {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .project-stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-label { color: var(--text-dim); }
  .stat-value { font-weight: 600; }
  .stat-value.score { color: var(--accent); }
  .stat-value.keep { color: var(--green); }
  .stat-value.revert { color: var(--red); }

  /* Event stream */
  .event-item {
    padding: 6px 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-size: 11px;
    padding-top: 1px;
  }

  .event-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .event-badge.agent-started { background: #1f3a5f; color: var(--accent); }
  .event-badge.agent-completed { background: #1a3a2a; color: var(--green); }
  .event-badge.agent-failed { background: #3d1f1f; color: var(--red); }
  .event-badge.agent-timeout { background: #3d2e1f; color: var(--yellow); }
  .event-badge.experiment-begin { background: #2a2040; color: #b392f0; }
  .event-badge.experiment-finalize { background: #2a2040; color: #b392f0; }
  .event-badge.cycle-started { background: #1f3a3a; color: var(--cyan); }
  .event-badge.cycle-completed { background: #1f3a3a; color: var(--cyan); }
  .event-badge.detect { background: #1f2d3a; color: #79c0ff; }
  .event-badge.discover-started { background: #1f2d3a; color: #79c0ff; }
  .event-badge.discover-completed { background: #1a3a2a; color: var(--green); }
  .event-badge.eval-started { background: #2d2a1f; color: var(--yellow); }
  .event-badge.eval-completed { background: #2d2a1f; color: var(--yellow); }
  .event-badge.guard-completed { background: #1f3a2a; color: var(--green); }
  .event-badge.study-started { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.study-completed { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.insights-started { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.insights-completed { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.ace-started { background: #3a1f2a; color: #ff7eb6; }
  .event-badge.ace-completed { background: #3a1f2a; color: #ff7eb6; }
  .event-badge.archive-completed { background: #1f3a3a; color: var(--cyan); }

  .event-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .event-project {
    color: var(--accent);
    font-weight: 600;
  }

  /* Experiments table */
  .exp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .exp-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
  }

  .exp-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }

  .verdict-keep { color: var(--green); font-weight: 600; }
  .verdict-revert { color: var(--red); font-weight: 600; }
  .verdict-error { color: var(--yellow); font-weight: 600; }

  .delta-positive { color: var(--green); }
  .delta-negative { color: var(--red); }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Score color helpers */
  .score-green { color: var(--green); }
  .score-yellow { color: var(--yellow); }
  .score-red { color: var(--red); }

  .score-clickable { cursor: pointer; }
  .score-clickable:hover { text-decoration: underline; }

  /* KPI strip */
  .kpi-strip {
    grid-column: 1 / -1;
    display: flex;
    gap: 16px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .kpi-card {
    flex: 1;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .kpi-bar {
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .kpi-bar-keep { background: var(--green); }
  .kpi-bar-revert { background: var(--red); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }

  .modal-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; max-width: 500px; width: 90%;
    position: relative;
  }

  .modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal-title {
    font-size: 16px; font-weight: 700; margin-bottom: 4px;
    color: var(--accent);
  }

  .modal-score {
    font-size: 28px; font-weight: 800; margin-bottom: 16px;
  }

  .modal-chart-wrap {
    width: 100%; max-width: 420px; margin: 0 auto;
  }

  /* View toggle */
  .view-toggle {
    float: right;
    display: inline-flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .toggle-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 2px 10px;
    font-size: 10px;
    font-family: var(--font);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .toggle-btn.active {
    background: var(--accent);
    color: var(--bg);
  }
  .toggle-btn:hover:not(.active) {
    background: var(--surface);
  }

  /* Responsive */
  @media (max-width: 800px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto;
    }
    .kpi-strip { flex-wrap: wrap; }
    .kpi-card { min-width: calc(50% - 12px); }
    .projects-panel { grid-row: 2; max-height: 200px; }
    .events-panel { grid-column: 1; grid-row: 3; }
    .experiments-panel { grid-column: 1; grid-row: 4; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FACTORY</div>
  <div class="header-info">
    <div class="subtitle">Multi-Agent Software Evolution</div>
    <div class="status">
      <span class="dot" id="stream-dot"></span>
      <span id="stream-status">Connecting...</span>
    </div>
  </div>
</header>

<main>
  <div class="kpi-strip" id="kpi-strip"></div>

  <div class="panel projects-panel">
    <div class="panel-header">Projects</div>
    <div class="panel-body" id="projects-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div class="panel events-panel">
    <div class="panel-header">Live Events</div>
    <div class="panel-body" id="events-list">
      <div class="empty-state">Waiting for events...</div>
    </div>
  </div>

  <div class="panel experiments-panel">
    <div class="panel-header">
      Experiments <span id="exp-project-name"></span>
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" data-view="table">Table</button>
        <button class="toggle-btn" data-view="chart">Chart</button>
      </div>
    </div>
    <div class="panel-body" id="experiments-list">
      <div class="empty-state">Select a project to view experiments</div>
    </div>
    <div class="panel-body" id="chart-container" style="display:none;height:300px">
      <canvas id="score-chart"></canvas>
    </div>
  </div>
</main>

<script>
let selectedProject = null;
let eventCount = 0;

// ── Projects ──
async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();
    renderProjects(projects);
    // Auto-select first project
    if (projects.length > 0 && !selectedProject) {
      selectProject(projects[0].name);
    }
  } catch (e) {
    document.getElementById('projects-list').innerHTML =
      '<div class="empty-state">Failed to load projects</div>';
  }
}

function renderProjects(projects) {
  const el = document.getElementById('projects-list');
  if (projects.length === 0) {
    el.innerHTML = '<div class="empty-state">No factory projects found</div>';
    return;
  }

  el.innerHTML = projects.map(p => {
    const scores = p.scores || [];
    const spark = sparkline(scores);
    const scoreHtml = p.latest_score != null
      ? `<div class="stat"><span class="stat-label">Score</span><span class="stat-value score-clickable ${scoreColorClass(p.latest_score)}" onclick="event.stopPropagation(); openDimensionModal('${p.name}', ${p.latest_score})">${p.latest_score.toFixed(3)}</span>${spark}</div>`
      : '';
    return `
    <div class="project-card ${p.name === selectedProject ? 'selected' : ''}"
         onclick="selectProject('${p.name}')">
      <div class="project-name">
        <span class="dot ${p.active ? 'live' : 'idle'}"></span>
        ${esc(p.name)}
      </div>
      ${p.goal ? `<div class="project-goal">${esc(p.goal)}</div>` : ''}
      <div class="project-stats">
        ${scoreHtml}
        <div class="stat"><span class="stat-label">Exp</span><span class="stat-value">${p.experiment_count}</span></div>
        <div class="stat"><span class="stat-value keep">${p.keep_count}K</span></div>
        <div class="stat"><span class="stat-value revert">${p.revert_count}R</span></div>
      </div>
    </div>`;
  }).join('');
}

async function selectProject(name) {
  selectedProject = name;
  loadProjects();  // Re-render to update selection
  loadExperiments(name);
}

// ── Experiments ──
async function loadExperiments(name) {
  document.getElementById('exp-project-name').textContent = `— ${name}`;
  try {
    const res = await fetch(`/api/projects/${name}/history`);
    const rows = await res.json();
    renderExperiments(rows);
    if (isChartViewActive()) {
      renderScoreChart(rows);
    }
  } catch (e) {
    document.getElementById('experiments-list').innerHTML =
      '<div class="empty-state">Failed to load experiments</div>';
  }
}

function renderExperiments(rows) {
  const el = document.getElementById('experiments-list');
  if (rows.length === 0) {
    el.innerHTML = '<div class="empty-state">No experiments recorded</div>';
    return;
  }

  // Reverse to show newest first
  const sorted = [...rows].reverse();

  el.innerHTML = `<table class="exp-table">
    <thead><tr>
      <th>ID</th><th>Verdict</th><th>Delta</th><th>Score</th><th>Hypothesis</th>
    </tr></thead>
    <tbody>${sorted.map(r => {
      const delta = r.delta ? parseFloat(r.delta) : null;
      const deltaStr = delta != null ? (delta >= 0 ? '+' : '') + delta.toFixed(4) : '—';
      const deltaClass = delta != null ? (delta >= 0 ? 'delta-positive' : 'delta-negative') : '';
      const verdictClass = 'verdict-' + (r.verdict || 'error');
      const score = r.score_after ? parseFloat(r.score_after).toFixed(3) : '—';
      return `<tr>
        <td>${r.id}</td>
        <td class="${verdictClass}">${r.verdict}</td>
        <td class="${deltaClass}">${deltaStr}</td>
        <td>${score}</td>
        <td>${esc((r.hypothesis || '').substring(0, 60))}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ── Events SSE ──
function connectSSE() {
  const evtSource = new EventSource('/api/events/stream');
  const dot = document.getElementById('stream-dot');
  const status = document.getElementById('stream-status');

  evtSource.onopen = () => {
    dot.className = 'dot live';
    status.textContent = 'Connected';
  };

  evtSource.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      addEvent(event);
      // Refresh projects and summary on every event
      loadProjects();
      loadSummary();
      // Refresh experiments if the event is for the selected project
      if (selectedProject && event.project === selectedProject) {
        loadExperiments(selectedProject);
      }
    } catch (err) {
      console.error('Failed to parse event:', err);
    }
  };

  evtSource.onerror = () => {
    dot.className = 'dot idle';
    status.textContent = 'Reconnecting...';
  };
}

function addEvent(event) {
  const el = document.getElementById('events-list');
  // Remove empty state
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();

  const ts = new Date(event.timestamp);
  const timeStr = ts.toLocaleTimeString('en-US', { hour12: false });
  const badgeClass = (event.type || '').replace(/\./g, '-');

  const desc = formatEventDesc(event);

  const div = document.createElement('div');
  div.className = 'event-item';
  div.innerHTML = `
    <span class="event-time">${timeStr}</span>
    <span class="event-badge ${badgeClass}">${esc(event.type)}</span>
    <span class="event-text">
      <span class="event-project">${esc(event.project)}</span>
      ${desc}
    </span>
  `;

  el.insertBefore(div, el.firstChild);

  // Cap at 200 events in DOM
  while (el.children.length > 200) {
    el.removeChild(el.lastChild);
  }
}

function formatEventDesc(event) {
  const d = event.data || {};
  const t = event.type || '';
  if (event.agent) {
    if (t === 'agent.completed') {
      return ` ${esc(event.agent)} finished (exit ${d.return_code ?? '?'})`;
    }
    return ` ${esc(event.agent)} — ${esc(d.task || '').substring(0, 60)}`;
  }
  if (t === 'detect') return ` state → ${esc(d.state)}`;
  if (t === 'discover.started') return ' introspecting project…';
  if (t === 'discover.completed') {
    return ` ${esc(d.language || '?')}/${esc(d.framework || '?')} — ${(d.dimensions || []).length} dimensions`;
  }
  if (t === 'eval.started') return ` running: ${esc((d.command || '').substring(0, 40))}`;
  if (t === 'eval.completed') {
    const s = d.composite != null ? d.composite.toFixed(3) : '?';
    return ` score=${s} ${d.passed ? '✓' : '✗'} (${d.dimensions} dims)`;
  }
  if (t === 'guard.completed') return d.clean ? ' clean' : ` ${d.violations} violation(s)`;
  if (t === 'experiment.begin') return ` #${d.exp_id} ${esc((d.hypothesis || '').substring(0, 60))}`;
  if (t === 'experiment.finalize') return ` #${d.exp_id} → ${d.verdict}`;
  if (t === 'study.started') return ' analyzing code…';
  if (t === 'study.completed') return ` ${d.chars} chars written`;
  if (t === 'insights.started') return ' cross-project analysis…';
  if (t === 'insights.completed') return ` ${d.projects_analyzed} projects, ${d.total_experiments} experiments`;
  if (t === 'ace.started') return d.dry_run ? ' (dry run)' : ' evolving playbooks…';
  if (t === 'ace.completed') return ` ${(d.roles_updated || []).length} roles updated`;
  if (t === 'archive.completed') return ` ${d.experiments} experiments → vault`;
  if (d.hypothesis) return ` ${esc(d.hypothesis.substring(0, 60))}`;
  if (d.verdict) return ` #${d.exp_id} ${d.verdict}`;
  if (d.mode) return ` mode=${esc(d.mode)}`;
  return '';
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Sparklines ──
function sparkline(scores) {
  if (scores.length < 2) return '';
  const w = 60, h = 20;
  const min = Math.min(...scores), max = Math.max(...scores);
  const range = max - min || 1;
  const points = scores.map((s, i) =>
    `${(i / (scores.length - 1)) * w},${h - ((s - min) / range) * h}`
  ).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;margin-left:8px"><polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

// ── Score color ──
function scoreColorClass(score) {
  if (score >= 0.8) return 'score-green';
  if (score >= 0.6) return 'score-yellow';
  return 'score-red';
}

function scoreColor(score) {
  if (score >= 0.8) return 'var(--green)';
  if (score >= 0.6) return 'var(--yellow)';
  return 'var(--red)';
}

// ── Dimension radar modal ──
let radarChartInstance = null;

function openDimensionModal(projectName, compositeScore) {
  // Remove existing modal if any
  closeModal();

  fetch(`/api/projects/${projectName}/dimensions`)
    .then(res => res.json())
    .then(data => {
      const dims = data.dimensions || [];
      if (dims.length === 0) {
        return; // No data to show
      }
      renderModal(projectName, compositeScore, dims);
    })
    .catch(err => console.error('Failed to load dimensions:', err));
}

function renderModal(projectName, compositeScore, dims) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'dimension-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  const hygieneNames = ['tests', 'lint', 'type_check', 'coverage', 'guard_patterns', 'config_parser'];

  overlay.innerHTML = `
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-title">${esc(projectName)}</div>
      <div class="modal-score" style="color: ${scoreColor(compositeScore)}">${compositeScore.toFixed(3)}</div>
      <div class="modal-chart-wrap">
        <canvas id="radar-chart"></canvas>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Build radar chart
  const labels = dims.map(d => d.name);
  const scores = dims.map(d => d.score);
  const bgColors = dims.map(d =>
    hygieneNames.includes(d.name) ? 'rgba(88,166,255,0.15)' : 'rgba(63,185,80,0.15)'
  );
  const borderColors = dims.map(d =>
    hygieneNames.includes(d.name) ? 'rgba(88,166,255,0.8)' : 'rgba(63,185,80,0.8)'
  );

  const ctx = document.getElementById('radar-chart').getContext('2d');
  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Hygiene',
          data: dims.map(d => hygieneNames.includes(d.name) ? d.score : null),
          backgroundColor: 'rgba(88,166,255,0.15)',
          borderColor: 'rgba(88,166,255,0.8)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(88,166,255,1)',
          pointRadius: 3,
          spanGaps: false,
        },
        {
          label: 'Growth',
          data: dims.map(d => !hygieneNames.includes(d.name) ? d.score : null),
          backgroundColor: 'rgba(63,185,80,0.15)',
          borderColor: 'rgba(63,185,80,0.8)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(63,185,80,1)',
          pointRadius: 3,
          spanGaps: false,
        },
      ],
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0,
          max: 1,
          ticks: {
            stepSize: 0.2,
            color: 'rgba(125,133,144,0.6)',
            backdropColor: 'transparent',
          },
          grid: {
            color: 'rgba(48,54,61,0.6)',
          },
          angleLines: {
            color: 'rgba(48,54,61,0.6)',
          },
          pointLabels: {
            color: '#e6edf3',
            font: { size: 10, family: 'var(--font)' },
          },
        },
      },
      plugins: {
        legend: {
          labels: {
            color: '#e6edf3',
            font: { size: 11 },
          },
        },
      },
    },
  });
}

function closeModal() {
  const existing = document.getElementById('dimension-modal');
  if (existing) {
    if (radarChartInstance) {
      radarChartInstance.destroy();
      radarChartInstance = null;
    }
    existing.remove();
  }
}

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── Score History Chart ──
let scoreChartInstance = null;

function renderScoreChart(rows) {
  if (scoreChartInstance) {
    scoreChartInstance.destroy();
    scoreChartInstance = null;
  }

  if (rows.length === 0) return;

  const hygieneNames = ['tests', 'lint', 'type_check', 'coverage', 'guard_patterns', 'config_parser'];

  const labels = rows.map(r => `#${r.id}`);
  const composites = rows.map(r => r.score_after ? parseFloat(r.score_after) : null);

  const hygieneAvgs = rows.map(r => {
    const dims = r.dimensions || [];
    const hyg = dims.filter(d => hygieneNames.includes(d.name));
    return hyg.length > 0 ? hyg.reduce((sum, d) => sum + d.score, 0) / hyg.length : null;
  });

  const growthAvgs = rows.map(r => {
    const dims = r.dimensions || [];
    const growth = dims.filter(d => !hygieneNames.includes(d.name));
    return growth.length > 0 ? growth.reduce((sum, d) => sum + d.score, 0) / growth.length : null;
  });

  const pointColors = rows.map(r => {
    if (r.verdict === 'keep') return '#3fb950';
    if (r.verdict === 'revert') return '#f85149';
    return '#d29922';
  });

  const ctx = document.getElementById('score-chart').getContext('2d');
  scoreChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Composite',
          data: composites,
          borderColor: 'rgba(88,166,255,1)',
          backgroundColor: 'rgba(88,166,255,0.1)',
          borderWidth: 2.5,
          pointBackgroundColor: pointColors,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: false,
          tension: 0.2,
        },
        {
          label: 'Hygiene Avg',
          data: hygieneAvgs,
          borderColor: 'rgba(88,166,255,0.4)',
          borderWidth: 1.5,
          borderDash: [4, 2],
          pointRadius: 0,
          fill: false,
          tension: 0.2,
        },
        {
          label: 'Growth Avg',
          data: growthAvgs,
          borderColor: 'rgba(63,185,80,0.4)',
          borderWidth: 1.5,
          borderDash: [4, 2],
          pointRadius: 0,
          fill: false,
          tension: 0.2,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 1,
          ticks: { color: 'rgba(125,133,144,0.6)', stepSize: 0.2 },
          grid: { color: 'rgba(48,54,61,0.6)' },
        },
        x: {
          ticks: { color: 'rgba(125,133,144,0.6)', font: { size: 10 } },
          grid: { display: false },
        },
      },
      plugins: {
        legend: {
          labels: { color: '#e6edf3', font: { size: 11 } },
        },
        tooltip: {
          callbacks: {
            afterLabel: function(ctx) {
              const row = rows[ctx.dataIndex];
              const parts = [];
              if (row.hypothesis) parts.push(row.hypothesis.substring(0, 40));
              if (row.delta) parts.push('delta: ' + row.delta);
              if (row.verdict) parts.push('verdict: ' + row.verdict);
              return parts.join('\n');
            },
          },
        },
      },
    },
  });
}

function initToggle() {
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const view = btn.dataset.view;
      document.getElementById('experiments-list').style.display = view === 'table' ? '' : 'none';
      document.getElementById('chart-container').style.display = view === 'chart' ? '' : 'none';
      if (view === 'chart' && selectedProject) {
        loadChartData(selectedProject);
      }
    });
  });
}

async function loadChartData(name) {
  try {
    const res = await fetch(`/api/projects/${name}/history`);
    const rows = await res.json();
    renderScoreChart(rows);
  } catch (e) {
    console.error('Failed to load chart data:', e);
  }
}

function isChartViewActive() {
  const active = document.querySelector('.toggle-btn.active');
  return active && active.dataset.view === 'chart';
}

// ── KPI Summary ──
async function loadSummary() {
  try {
    const res = await fetch('/api/summary');
    const data = await res.json();
    renderKPIs(data);
  } catch (e) {
    console.error('Failed to load summary:', e);
  }
}

function renderKPIs(data) {
  const el = document.getElementById('kpi-strip');
  const keepPct = data.total_experiments > 0
    ? ((data.keep_count / data.total_experiments) * 100).toFixed(0)
    : '0';
  const keepBarW = data.total_experiments > 0
    ? (data.keep_count / data.total_experiments * 100)
    : 0;

  el.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Projects</div>
      <div class="kpi-value">${data.total_projects}
        <span style="font-size:12px;color:var(--green)">${data.active_projects} active</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg Score</div>
      <div class="kpi-value" style="color:${scoreColor(data.avg_score)}">${data.avg_score != null ? data.avg_score.toFixed(3) : '\u2014'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Experiments</div>
      <div class="kpi-value">${data.total_experiments}</div>
      <div class="kpi-bar">
        <div class="kpi-bar-keep" style="width:${keepBarW}%"></div>
        <div class="kpi-bar-revert" style="width:${100 - keepBarW}%"></div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Keep Rate</div>
      <div class="kpi-value" style="color:${scoreColor(data.keep_rate)}">${keepPct}%</div>
    </div>
  `;
}

// ── Init ──
loadProjects();
loadSummary();
connectSSE();
initToggle();
// Refresh projects every 10s
setInterval(() => {
  loadProjects();
  loadSummary();
  if (selectedProject) loadExperiments(selectedProject);
}, 10000);
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
