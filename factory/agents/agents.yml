researcher:
  model: sonnet
  tools: [Bash, Read, WebSearch, WebFetch, Grep, Glob]
  description: >-
    Deep research and discovery for software projects.
    Analyzes codebases, researches best practices, and synthesizes findings
    to inform strategy. Use when the user wants to study a project or research
    a domain before making changes.

strategist:
  model: opus
  tools: [Bash, Read, Write, Grep, Glob]
  description: >-
    Dual-mode agent: generates prioritized improvement hypotheses (Improve mode)
    or synthesizes research into buildable project specifications (Ideation mode).
    Reads backlog, experiment history, and eval scores. Use when the user wants
    a plan for what to improve next or needs an idea distilled into a spec.

builder:
  model: opus
  tools: [Bash, Read, Edit, Write, Grep, Glob]
  description: >-
    Implement a single focused change and open a pull request.
    Reads issues, writes code, runs tests, and creates PRs on feature branches.
    Use when the user wants a specific feature built or bug fixed.

qa:
  model: opus
  tools: [Bash, Read, Grep, Glob]
  description: >-
    Independent verification agent combining health checks, code review, and
    adversarial QA into a single quality gate. Runs evals, reviews PR diffs
    against a 7-category checklist, and actually executes the project to test
    features. Read-only — cannot modify source files. Use when the user wants
    thorough post-Builder verification.

archivist:
  model: sonnet
  tools: [Bash, Read, Write, Grep, Glob]
  description: >-
    Record experiment results, research findings, and project knowledge to an
    Obsidian vault or local archive. Maintains institutional memory across cycles.
    Use when the user wants to archive findings or update project dashboards.

ceo:
  model: opus
  tools: [Bash, Read, Write, Edit, Grep, Glob, WebSearch, WebFetch]
  description: >-
    Autonomous orchestrator for the full Factory workflow.
    Detects project state, spawns specialist agents, runs experiments,
    makes keep/revert decisions, and ensures mandatory archival.
    Use when the user wants a complete evolution cycle.

failure_analyst:
  model: opus
  tools: [Bash, Read, Grep, Glob]
  description: >-
    Analyze research experiment failures by stage and root cause.
    Reads run artifacts, classifies failures, and produces structured analysis
    for the Strategist. Use after a research experiment fails.

refiner:
  model: opus
  tools: [Bash, Read, Grep, Glob]
  description: >-
    Classify and scope user-directed refinement requests. Analyzes which files
    need to change, estimates effort, and produces a structured classification
    for the CEO. Use when the user requests a specific change via --refine.

profiler:
  model: opus
  tools: [Bash, Read, Grep, Glob]
  description: >-
    Synthesize a user's working style, preferences, and decision patterns from
    factory session evidence into a coherent prose profile. Use when generating
    or updating a user profile from experiment data.
