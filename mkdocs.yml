site_name: "re:factory"
site_description: A harness for agentic software evolution — detect, delegate, evaluate, archive
site_url: https://akashgit.github.io/remote-factory/
repo_url: https://github.com/akashgit/remote-factory
repo_name: akashgit/remote-factory

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started.md
      - Setup: setup.md
      - Configuration: configuration.md
  - Concepts:
      - Architecture: architecture.md
      - Eval System: eval.md
      - Self-Improvement Loop: self-improvement.md
      - ACE Playbook Evolution: ace.md
  - Contributing: contributing.md
  - Changelog: changelog.md
