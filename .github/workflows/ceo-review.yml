name: CEO PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@ceo-review') &&
      contains(fromJSON('["akashgit", "xukai92", "colehurwitz", "shivchander"]'), github.event.comment.user.login)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: React with eyes
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR number
        id: pr
        run: echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/merge
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install factory
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude Code on PATH
        run: |
          export PATH="$(npm prefix -g)/bin:$PATH"
          echo "PATH=$(npm prefix -g)/bin:$PATH" >> "$GITHUB_ENV"
          claude --version

      - name: Run CEO review
        env:
          CLAUDE_CODE_USE_VERTEX: "1"
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run factory ceo . --mode review --pr ${{ steps.pr.outputs.number }} --headless

      - name: Approve PR if verdict is KEEP
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }},
            });
            const latestBot = reviews.data.reverse().find(r =>
              r.user.login === 'github-actions[bot]'
            );
            if (!latestBot) {
              core.info('No formal review from github-actions[bot] found');
              return;
            }
            if (latestBot.state === 'APPROVED') {
              core.info('PR already approved by factory review');
            } else if (latestBot.state === 'CHANGES_REQUESTED') {
              core.info('Factory review requested changes — not approving');
            } else {
              core.info(`Unexpected review state: ${latestBot.state}`);
            }

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: '❌ CEO review failed. Check the [workflow run](' +
                    `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                    ') for details.',
            });
